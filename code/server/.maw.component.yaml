    test_zh: "#发布测试：发布 server"
    staging: "#发布：发布 server 到 staging"
    staging_zh: "#发布上线：发布 server"
    production: "#发布：发布 server 到 production"
    production_zh: "#发布生产：发布 server"
    production_typo_zh: "#发布生成：发布 server"
    custom: "#发布：发布 server 到 <env>"
  default_test_release: server_to_internal_test
  external_repo_release: server_to_external_repo
