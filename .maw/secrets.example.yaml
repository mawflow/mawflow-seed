# 完整敏感配置示例：复制需要的字段到 `.maw/secrets.yaml`、`.maw/secrets.dev.yaml`、`.maw/secrets.pro.yaml` 或本机 `.maw/secrets.local.yaml`。
# 新模板推荐提交 mawsec/mawlocal/mawproxy 引用或宿主机本地 SecretStore 映射；可信私有仓库明文值长期兼容，但外部交付前必须脱敏。
# URI 中的 `<org_key>`、`<project_key>`、`<host_service_key>` 均为占位，不是真实凭证。
secrets:
  managed_envelopes:
    # Phase3 envelope 示例只描述密文包元数据；密文 payload 由治理后台或授权宿主机缓存保存，不提交明文值。
    git_internal_token:
      envelope_id: "env_<placeholder>"
      credential_type: git_https_token
      credential_key: internal
      version: 1
      algorithm: "age_x25519"
      fingerprint: "sha256:<redacted>"
      recipient_ids:
        - "host:<host_service_key>"
      ref: "mawsec://org/<org_key>/project/<project_key>/git_https_token/internal#token"
      rotation:
        previous_fingerprint: ""
        current_fingerprint: "sha256:<redacted>"
        rotated_at: "2026-01-01T00:00:00Z"
        expires_at: ""
      phase4_lifecycle:
        readiness_target: ready_for_test_host_pilot
        secret_store_backend: host_owner_only_file
        allowed_use_modes:
          - git-fetch
          - git-push
        grant_policy:
          update_allowed_use_modes: true
          can_modify: false
          can_export_plaintext: false
        helper_isolation:
          explicit_http_channels_clear_git_credential_helper: true
          git_config_override: "credential.helper="
          write_pilot_validation: temporary branch/tag create and delete with temporary HOME
        rotation_window_days: 90
        revoke_after: ""
        alert_policy_ref: metadata_only_no_secret_values
        audit_events:
          - grant_created
          - grant_updated
          - helper_session_created
          - git_push_temporary_ref_verified
          - rotation_prepared
          - revoke_completed
    short_ttl_handles:
      git_askpass:
        proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_https_token/internal?mode=git-askpass"
        handle_env: "MAW_GIT_SESSION_HANDLE"
        default_ttl_seconds: 300
        scope:
          - project:<project_key>
          - credential:git_https_token/internal
          - mode:git-askpass
      git_ssh:
        proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_ssh_deploy_key/internal?mode=git-ssh"
        handle_env: "MAW_GIT_SESSION_HANDLE"
        default_ttl_seconds: 300
        scope:
          - project:<project_key>
          - credential:git_ssh_deploy_key/internal
          - mode:git-ssh

  capability_variables:
    # 这些变量只保存凭证引用，供宿主机能力管理、项目级 MCP 或受控脚本注入当前进程。
    MAW_GIT_HTTPS_TOKEN_REF: "mawsec://org/<org_key>/project/<project_key>/git_https_token/internal#token"
    MAW_GIT_SSH_DEPLOY_KEY_REF: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/internal#private_key"
    MAW_SERVER_SSH_REF: "mawsec://org/<org_key>/project/<project_key>/server_ssh/<env>#private_key"
    MAW_AI_PROVIDER_API_KEY_REF: "mawsec://org/<org_key>/project/<project_key>/ai_provider_api_key/default#api_key"
    MAW_DATABASE_CONNECTION_STRING_REF: "mawsec://org/<org_key>/project/<project_key>/database_connection_string/server-dev#connection_string"
    MAW_ARTIFACT_STORAGE_REF: "mawsec://org/<org_key>/project/<project_key>/object_storage/artifacts#secret_key"
    MAW_OBJECT_STORAGE_REF: "mawsec://org/<org_key>/project/<project_key>/object_storage/dev#secret_key"
    MAW_THIRD_PARTY_REF: "mawsec://org/<org_key>/project/<project_key>/third_party_saas_token/issue-tracker#token"
    MAW_WEBHOOK_SECRET_REF: "mawsec://org/<org_key>/project/<project_key>/webhook_secret/deploy#signing_secret"
    MAW_THIRD_PARTY_SAAS_TOKEN_REF: "mawsec://org/<org_key>/project/<project_key>/third_party_saas_token/issue-tracker#token"
    legacy_aliases:
      MAW_DATABASE_REF: "use MAW_DATABASE_CONNECTION_STRING_REF"
      MAW_AI_PROVIDER_REF: "use MAW_AI_PROVIDER_API_KEY_REF"
      MAW_DEPLOY_SSH_REF: "use MAW_SERVER_SSH_REF"

  remote_test_server:
    # 可选远端测试机凭证；默认本机 Docker test 通常不需要 SSH 凭证。
    # 可明文普通参数：port、workdir、branch；host/user 可按项目敏感级别选择明文或引用。
    host: "mawsec://org/<org_key>/project/<project_key>/server_ssh/test#host"
    port: 22
    user: "mawsec://org/<org_key>/project/<project_key>/server_ssh/test#username"
    workdir: "/srv/<project_key>/test"
    branch: "main"
    auth_method: "host_secret"
    # secret 字段：private_key、password、passphrase、known_hosts 建议使用引用。
    ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/server_ssh/test#private_key"
    password: "mawsec://org/<org_key>/project/<project_key>/server_ssh/test#password"
    known_hosts_path: "mawsec://org/<org_key>/project/<project_key>/server_ssh/test#known_hosts"
    proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/server_ssh/test?mode=remote-ssh-wrapper"
    healthcheck_url: "https://test.example.com/health"
    notes: "trusted private plaintext compatibility remains warning-only; public/release/diagnostic/export/strict contexts must block or desensitize real values"

  remote_staging_server:
    # 中枢服务所在服务器，或另一套由宿主机维护且具备公开访问地址的 Docker 环境。
    host: "mawsec://org/<org_key>/project/<project_key>/server_ssh/staging#host"
    port: 22
    user: "mawsec://org/<org_key>/project/<project_key>/server_ssh/staging#username"
    workdir: "/srv/<project_key>/staging"
    branch: "main"
    auth_method: "host_secret"
    ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/server_ssh/staging#private_key"
    password: "mawsec://org/<org_key>/project/<project_key>/server_ssh/staging#password"
    known_hosts_path: "mawsec://org/<org_key>/project/<project_key>/server_ssh/staging#known_hosts"
    proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/server_ssh/staging?mode=remote-ssh-wrapper"
    healthcheck_url: "https://staging.example.com/health"
    notes: "Use for central services or a host-managed Docker environment with a public access address."

  remote_production_server:
    # 客户生产服务器凭证；一般与 test/staging 分开授权、轮换和撤销。
    host: "mawsec://org/<org_key>/project/<project_key>/server_ssh/production#host"
    port: 22
    user: "mawsec://org/<org_key>/project/<project_key>/server_ssh/production#username"
    workdir: "/srv/<project_key>/production"
    branch: "main"
    auth_method: "host_secret"
    ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/server_ssh/production#private_key"
    password: "mawsec://org/<org_key>/project/<project_key>/server_ssh/production#password"
    known_hosts_path: "mawsec://org/<org_key>/project/<project_key>/server_ssh/production#known_hosts"
    proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/server_ssh/production?mode=remote-ssh-wrapper"
    healthcheck_url: "https://app.example.com/health"
    notes: ""

  git:
    # 内部受信任仓库：public 字段可明文，secret 字段使用 mawsec 或 mawproxy。
    internal:
      provider: "github"
      remote_url: "git@github.com:org/repo.git"
      ssh_remote_url: "git@github.com:org/repo.git"
      https_remote_url: "https://github.com/org/repo.git"
      auth_method: "host_secret"
      channel_priority:
        - last_success
        - host_secret
        - mawproxy_git_ssh
        - mawproxy_git_askpass
        - ssh_key
        - https_token
        - credential_helper
        - local_git_environment
      default_channel: ""
      deploy_key_name: "maw-<project_key>"
      ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/internal#private_key"
      ssh_public_key: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/internal#public_key"
      token: "mawsec://org/<org_key>/project/<project_key>/git_https_token/internal#token"
      token_env: ""
      token_username: "x-access-token"
      token_scope: "contents:read/write"
      allowed_use_modes:
        - git-fetch
        - git-push
      helper_isolation: "explicit HTTP channels must run Git with credential.helper= unless channel is credential_helper/local_git_environment"
      proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_https_token/internal?mode=git-askpass"
      ssh_proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_ssh_deploy_key/internal?mode=git-ssh"
      netrc_path: ""
      known_hosts_path: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/internal#known_hosts"

    external_components:
      server:
        provider: "gitlab"
        remote_url: "git@gitlab.example.com:customer/project-server.git"
        ssh_remote_url: "git@gitlab.example.com:customer/project-server.git"
        https_remote_url: "https://gitlab.example.com/customer/project-server.git"
        auth_method: "host_secret"
        channel_priority:
          - last_success
          - host_secret
          - mawproxy_git_ssh
          - mawproxy_git_askpass
          - ssh_key
          - https_token
          - credential_helper
          - local_git_environment
        ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/customer-server#private_key"
        token: "mawsec://org/<org_key>/project/<project_key>/git_https_token/customer-server#token"
        token_env: ""
        token_username: "oauth2"
        proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_https_token/customer-server?mode=git-askpass"
      client:
        provider: ""
        remote_url: ""
        ssh_remote_url: ""
        https_remote_url: ""
        auth_method: ""
        channel_priority: []
        ssh_private_key_path: ""
        token: ""
        proxy_ref: ""

    repository_mirrors:
      default:
        provider: ""
        remote_url: ""
        ssh_remote_url: ""
        https_remote_url: ""
        auth_method: "host_secret"
        channel_priority:
          - last_success
          - host_secret
          - mawproxy_git_ssh
          - mawproxy_git_askpass
          - ssh_key
          - https_token
          - credential_helper
          - local_git_environment
        ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/repository-mirror#private_key"
        token: "mawsec://org/<org_key>/project/<project_key>/git_https_token/repository-mirror#token"
        proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_https_token/repository-mirror?mode=git-askpass"
      secondary:
        provider: ""
        remote_url: ""
        ssh_remote_url: ""
        https_remote_url: ""
        auth_method: "host_secret"
        channel_priority:
          - last_success
          - host_secret
          - mawproxy_git_ssh
          - mawproxy_git_askpass
          - ssh_key
          - https_token
          - credential_helper
          - local_git_environment
        ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/repository-mirror-secondary#private_key"
        token: "mawsec://org/<org_key>/project/<project_key>/git_https_token/repository-mirror-secondary#token"
        proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_https_token/repository-mirror-secondary?mode=git-askpass"

    repository_publish_mirrors:
      public_seed:
        provider: "github"
        remote_url: ""
        ssh_remote_url: ""
        https_remote_url: ""
        auth_method: "host_secret"
        channel_priority:
          - last_success
          - host_secret
          - mawproxy_git_ssh
          - mawproxy_git_askpass
          - ssh_key
          - https_token
          - credential_helper
          - local_git_environment
        ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/public-seed#private_key"
        token: "mawsec://org/<org_key>/project/<project_key>/git_https_token/public-seed#token"
        proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_https_token/public-seed?mode=git-askpass"

    mirror_components:
      server:
        provider: ""
        remote_url: ""
        ssh_remote_url: ""
        https_remote_url: ""
        auth_method: "host_secret"
        ssh_private_key_path: "mawsec://org/<org_key>/project/<project_key>/git_ssh_deploy_key/server-mirror#private_key"
        token: "mawsec://org/<org_key>/project/<project_key>/git_https_token/server-mirror#token"
        proxy_ref: "mawproxy://org/<org_key>/project/<project_key>/git_https_token/server-mirror?mode=git-askpass"
      client:
        provider: ""
        remote_url: ""
        ssh_remote_url: ""
        https_remote_url: ""
        auth_method: ""
        ssh_private_key_path: ""
        token: ""
        proxy_ref: ""

  deploy_ftp:
    staging:
      # Trusted private projects may store a plaintext FTP URL here.
      # Public repos, delivery packages, logs and release records must redact the password.
      url: "ftp://<username>:<password>@<host>:21/<remote-dir>"
      host: "<host>"
      port: 21
      username: "<username>"
      password: "<password>"
      passive: true
      timeout: 30
      verify_tls: true
      allowed_use_modes:
        - deploy-staging
        - ftp-overwrite
    production:
      # Prefer ftps:// for production when the server supports explicit TLS.
      url: "ftps://<username>:<password>@<host>:21/<remote-dir>"
      host: "<host>"
      port: 21
      username: "<username>"
      password: "<password>"
      passive: true
      timeout: 30
      verify_tls: true
      allowed_use_modes:
        - deploy-production
        - ftp-overwrite

  app_debug:
    apps:
      server:
        database:
          dev:
            # 普通参数可明文：engine、host、port、name、ssl。密码和 CA 使用引用。
            engine: "mysql"
            host: "127.0.0.1"
            port: 3306
            name: "<project_key>_dev"
            connection_string: "mawsec://org/<org_key>/project/<project_key>/database_connection_string/server-dev#connection_string"
            username: "mawsec://org/<org_key>/project/<project_key>/database/server-dev#username"
            password: "mawsec://org/<org_key>/project/<project_key>/database/server-dev#password"
            ssl: false
            ssl_ca: "mawsec://org/<org_key>/project/<project_key>/database/server-dev#ssl_ca"
          pro:
            engine: "mysql"
            host: "mawsec://org/<org_key>/project/<project_key>/database/server-pro#host"
            port: 3306
            name: "<project_key>_pro"
            username: "mawsec://org/<org_key>/project/<project_key>/database/server-pro#username"
            password: "mawsec://org/<org_key>/project/<project_key>/database/server-pro#password"
            ssl: true
            ssl_ca: "mawsec://org/<org_key>/project/<project_key>/database/server-pro#ssl_ca"
        redis:
          dev:
            host: "127.0.0.1"
            port: 6379
            db: 0
            password: "mawsec://org/<org_key>/project/<project_key>/cache/server-dev#password"
            tls: false
        object_storage:
          dev:
            provider: "minio"
            endpoint: "https://storage.example.com"
            bucket: "<project_key>"
            access_key: "mawsec://org/<org_key>/project/<project_key>/object_storage/dev#access_key"
            secret_key: "mawsec://org/<org_key>/project/<project_key>/object_storage/dev#secret_key"
            access_key_id: "mawsec://org/<org_key>/project/<project_key>/object_storage/dev#access_key_id"
            secret_access_key: "mawsec://org/<org_key>/project/<project_key>/object_storage/dev#secret_access_key"
            region: ""
        test_accounts:
          default:
            # 团队共享测试账号可用 mawsec；个人账号建议用 mawlocal。
            username: "mawlocal://host/<host_service_key>/personal_test_account/server-default#username"
            password: "mawlocal://host/<host_service_key>/personal_test_account/server-default#password"
            role: "tester"
      client:
        api_base_url:
          dev: "http://127.0.0.1:8000/api"
          pro: "https://api.example.com"
        test_accounts:
          default:
            username: "mawlocal://host/<host_service_key>/personal_test_account/client-default#username"
            password: "mawlocal://host/<host_service_key>/personal_test_account/client-default#password"
            role: "user"

  third_party_apis:
    ai_provider_default:
      name: "Default AI Provider"
      provider: "openai-compatible"
      base_url: "https://api.example.com/v1"
      model_scope: "dev-test"
      quota_policy: "project-limited"
      api_key_ref: "mawsec://org/<org_key>/project/<project_key>/ai_provider_api_key/default#api_key"
      api_key: "mawsec://org/<org_key>/project/<project_key>/ai_provider/default#api_key"
    example_service:
      name: "Example Service"
      base_url: "https://api.example.com"
      api_key: "mawsec://org/<org_key>/project/<project_key>/third_party_api/example_service#api_key"
      api_secret: "mawsec://org/<org_key>/project/<project_key>/third_party_api/example_service#api_secret"
      webhook_secret: "mawsec://org/<org_key>/project/<project_key>/third_party_api/example_service#webhook_secret"
    issue_tracker:
      name: "Example Issue Tracker"
      provider: "example-saas"
      tenant: "<tenant_key>"
      base_url: "https://saas.example.com"
      scopes:
        - tickets:read
        - tickets:write
      token: "mawsec://org/<org_key>/project/<project_key>/third_party_saas_token/issue-tracker#token"
      refresh_token: "mawsec://org/<org_key>/project/<project_key>/third_party_saas_token/issue-tracker#refresh_token"
      rotation:
        version: 1
        fingerprint: "sha256:<redacted>"
        expires_at: ""
      revocation:
        grant_ref: "mawsec://org/<org_key>/project/<project_key>/third_party_saas_token/issue-tracker#grant"
        local_cache_cleanup: required

  notifications:
    deploy:
      provider: "lark"
      channel: "deploy"
      signing_secret: "mawsec://org/<org_key>/project/<project_key>/webhook_secret/deploy#signing_secret"
      webhook_url: "mawsec://org/<org_key>/project/<project_key>/notification_webhook/deploy#webhook_url"
      sign_key: "mawsec://org/<org_key>/project/<project_key>/notification_webhook/deploy#sign_key"
    slack_webhook_url: "mawsec://org/<org_key>/project/<project_key>/notification_webhook/slack#webhook_url"
    wecom_webhook_url: "mawsec://org/<org_key>/project/<project_key>/notification_webhook/wecom#webhook_url"
    lark_webhook_url: "mawsec://org/<org_key>/project/<project_key>/notification_webhook/lark#webhook_url"

  local_examples:
    # 本机真实映射写入 `.maw/secrets.local.yaml` 或 `.local/.maw/secrets.yaml`，不要提交。
    developer_token: "mawlocal://host/<host_service_key>/developer_token/default#token"
    personal_test_account:
      username: "mawlocal://host/<host_service_key>/personal_test_account/default#username"
      password: "mawlocal://host/<host_service_key>/personal_test_account/default#password"

  legacy_plaintext_examples:
    # 仅用于受信任私有仓库和可信宿主机兼容迁移。新项目优先复制引用写法；严格模式、公开仓库、发布包、日志、诊断包和外部交付必须阻断或脱敏。
    git_internal_token: ""
    server_ssh_private_key_path: ".ssh/<project_key>_test_ed25519"
    database_password: ""
    webhook_url: ""

  plaintext_compatibility_policy:
    trusted_private_default: warning
    strict_or_external_default: block
    preferred_storage: reference_or_host_local
    phase3_preferred_runtime: envelope_or_short_ttl_proxy_handle
    compatible_files:
      - ".maw/secrets.yaml"
      - ".maw/secrets.dev.yaml"
      - ".maw/secrets.pro.yaml"
    block_contexts:
      - public_repository
      - release_package
      - diagnostic_package
      - log_output
      - unredacted_prompt_or_report
      - external_delivery
      - explicit_strict_mode
    helper_return_values:
      committed_files: forbidden
      logs: forbidden
      diagnostic_packages: forbidden
